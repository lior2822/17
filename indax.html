<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מה אתם מעדיפים?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <section class="quiz-card">
      <div class="top-bar">
        <h1>מה אתם מעדיפים?</h1>
        <div class="progress-wrap">
          <span id="progress-text">1/150</span>
          <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
      </div>

      <div class="question-panel">
        <p id="question">שאלה</p>
      </div>

      <div class="options">
        <button class="option-btn" id="optionA">אופציה א'</button>
        <button class="option-btn" id="optionB">אופציה ב'</button>
      </div>

      <div id="result-screen" class="result-screen hidden">
        <h2>סיימת את המשחק!</h2>
        <p id="result-summary"></p>
        <p id="result-detail"></p>
        <button id="restart-btn">להתחיל מחדש</button>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      { q: "להיות עם מלא חברים ולהישאר עני, או להיות עשיר בלי חברים?", a: "לחיות עם מלא חברים ולהישאר עני", b: "להיות עשיר בלי חברים" },
      { q: "ללכת לנסיעה מסוכנת עם החברים שלך, או להישאר בבית עם ביטחון ובכיס מלא?", a: "ללכת עם החברים", b: "להישאר בבטחה" },
      { q: "להתעורר כל בוקר עם אנשים שאוהבים אותך, או עם כסף שפותח לך דלתות?", a: "עם אנשים שאוהבים", b: "עם כסף" },
      { q: "להיות מוערך על ידי חבורה קטנה, או להעריץ אנשים עשירים שמכירים אותך רק בגלל הכסף?", a: "חבורה קטנה ואמיתית", b: "עושר ומעמד" },
      { q: "להתפשר על עושר בשביל רגעי שמחה אמיתיים, או לוותר על שמחה בשביל ביטחון כלכלי?", a: "שמחה אמיתית", b: "ביטחון כלכלי" },
      { q: "להתפטר מעבודה שאתה אוהב כדי להיות קרוב לאנשים שאתה אוהב, או להישאר בעבודה בשביל הכסף?", a: "להיות קרוב לאנשים", b: "להישאר בעבודה" },
      { q: "לקוות שמישהו יזכור אותך אחרי מוות, או להשאיר אחריך עושר שימשוך תשומת לב?", a: "יזכרו אותך", b: "תשאיר עושר" },
      { q: "לשבת עם חברים ולדבר על חלומות, או לעבוד קשה כדי להבטיח עתיד יציב?", a: "לדבר על חלומות", b: "לעבוד קשה" },
      { q: "לצאת מהבית בלי כסף אבל עם ידיים מלאות באהבה, או להישאר בבית עם כסף רב אבל בלי תחושת שייכות?", a: "אהבה וחיבור", b: "כסף" },
      { q: "להקים משפחה עם מעט מדי כסף, או להישאר רווק/ה עם הרבה כסף?", a: "משפחה", b: "כסף" },
      { q: "להתמודד עם בדידות כדי לשמור על כבוד, או להסתובב עם אנשים למרות שחיים בקשיים?", a: "להישאר עם אנשים", b: "לשמור על כבוד" },
      { q: "לתת יד לכל מי שצריך, או לתכנן את העתיד שלך בלי להיכנס לתוך מבוכה של אחרים?", a: "לעזור לאחרים", b: "להתמקד בעצמך" },
      { q: "להרגיש שאתה נאהב גם כשאין לך כלום, או להרגיש שאתה מוערך רק כשיש לך הרבה?", a: "להרגיש נאהב", b: "להרגיש מוערך" },
      { q: "לרכוש דברים שיכולים להפוך אותך למצליח, או דברים שיכולים להפוך אותך לאדם טוב יותר?", a: "להפוך לאדם טוב יותר", b: "להפוך למצליח" },
      { q: "להיות אדם שמקבל הזמנות מכל מקום, או אדם שיכול לבחור את מי שהוא באמת אוהב?", a: "להיות אהוב", b: "להיות חופשי" },
      { q: "לשבור את הראש על איך להרוויח יותר, או לשמור על קשרים עמוקים גם אם המצב הכלכלי קשה?", a: "לקיים קשרים", b: "להרוויח יותר" },
      { q: "לגור בעיר קטנה שבה כולם מכירים אותך, או בעיר ענקית שבה כולם מתעלמים ממך?", a: "עיר קטנה", b: "עיר ענקית" },
      { q: "לשמור על משפחה גדולה עם מעט כסף, או לחיות לבד עם הרבה כסף?", a: "משפחה גדולה", b: "לבד עם כסף" },
      { q: "לעבוד בשכר נמוך אך עם משמעות, או בעבודה קשה אך עם פנסיה גדולה?", a: "משמעות", b: "פנסיה" },
      { q: "לסמוך על אנשים שאתה מכיר, או להסתמך רק על הכסף שלך?", a: "על אנשים", b: "על הכסף" },
      { q: "להתעורר למשהו מסקרן אפילו אם אין בו רווח, או לעשות כסף כל יום בלי שום התרגשות?", a: "מסקרן", b: "רווחי" },
      { q: "להיות מוכן לוותר על נוחות בשביל עבודת צוות, או לוותר על צוות בשביל נוחות אישית?", a: "עבודת צוות", b: "נוחות" },
      { q: "ללמוד משהו חדש רק בשביל הכיף, או ללמוד משהו חדש כדי להרוויח יותר כסף?", a: "בשביל הכיף", b: "בשביל הכסף" },
      { q: "להיות השכן שמכיר את כולם, או השכן שמחזיק את הבית הכי גדול בשכונה?", a: "להכיר את כולם", b: "להחזיק את הבית הכי גדול" },
      { q: "לחיות עם שקט נפשי למרות מחסור, או עם רווחים אבל בלי שקט נפשי?", a: "שקט נפשי", b: "רווחים" },
      { q: "להתנדב במקצועך למרות שזו לא עבודה משתלמת, או להישאר בעבודה שמביאה לך כסף אבל לא משמעות?", a: "משמעות", b: "כסף" },
      { q: "לשמור על קשרים גם כשזה לוקח זמן, או להתרכז בעצמך גם אם זה פוגע בקשרים?", a: "קשרים", b: "להתרכז בעצמך" },
      { q: "לרצות להיות אהוב יותר מלהיות עשיר, או להיות עשיר יותר מלהיות אהוב?", a: "אהוב", b: "עשיר" },
      { q: "להתחייב למשהו גדול עם אנשים שאתה אוהב, או להישאר עצמאי ורק עם הסיכויים שלך?", a: "עם אנשים", b: "עצמאי" },
      { q: "לזכות להערכה מהאנשים הקרובים, או להערצה של אנשים רחוקים?", a: "מקרובים", b: "מאנשים רחוקים" },
      { q: "להסכים להישאר בעבודה שלא אוהבים רק כדי לשמור על חברים, או לעבור לעבודת חלומות בלי חברים?", a: "לשמור על חברים", b: "ללכת לעבודת חלומות" },
      { q: "להפוך את הבית שלך למקום של קהילה, או למקום שמייצר לך רווחים?", a: "קהילה", b: "רווח" },
      { q: "לשמור על שמחה עם כל מה שיש, או לחפש תמיד עוד כסף בשביל עוד שמחה?", a: "שמחה עם מה שיש", b: "עוד כסף" },
      { q: "להיות סוג של אדם שמטפל בכל מי שצריך, או סוג של אדם שמטפל רק בעצמו?", a: "לטפל באחרים", b: "לטפל בעצמי" },
      { q: "לקבל הזדמנות לעבודה טובה רק אם היא קרובה לחברים, או לקבל עבודה מפוארת גם אם היא מבודדת?", a: "קרובה לחברים", b: "מפוארת" },
      { q: "לשמור על שגרה יציבה עם מעט חברים, או לחיות בקצב תמידי עם המון אנשים?", a: "שגרה יציבה", b: "המון אנשים" },
      { q: "לאהוב את מה שאתה עושה גם אם אתה לא מרוויח הרבה, או להרוויח הרבה גם אם אתה לא אוהב את מה שאתה עושה?", a: "לאהוב את העבודה", b: "להרוויח הרבה" },
      { q: "לקחת סיכון כדי להיות עם האנשים שאתה אוהב, או להימנע מסיכונים כדי לשמור על הכסף?", a: "עם האנשים", b: "לשמור על הכסף" },
      { q: "להישאר נאמן למערכת של חברים, או לאמץ אורח חיים שמכניס יותר כסף?", a: "נאמן לחברים", b: "למקסם כסף" },
      { q: "להיות מישהו שמסוגל להאזין לאחרים, או מישהו שמסוגל להרשים את כולם?", a: "להאזין", b: "להרשים" },
      { q: "לפתוח עסק עם חבר טוב, או להשקיע לבד בידיעה שזה מסוכן?", a: "עם חבר", b: "לבד" },
      { q: "לארגן מסיבה גדולה בשביל כולם, או לבנות עתיד יציב בשביל עצמך?", a: "מסיבה גדולה", b: "עתיד יציב" },
      { q: "להיות נוטה לחפש אחרי אהבה, או אחרי ביטחון כלכלי?", a: "אהבה", b: "ביטחון" },
      { q: "לבחור בחיים עם פחות כסף אבל יותר רגעים משמעותיים, או יותר כסף אבל פחות רגעים משמעותיים?", a: "רגעים משמעותיים", b: "יותר כסף" },
      { q: "לקבל מחמאות על נדיבות, או על הצלחה כלכלית?", a: "נדיבות", b: "הצלחה כלכלית" },
      { q: "לגור במקום שבו כולם מדברים ביניהם, או במקום שבו כולם שומרים על מרחק?", a: "מדברים ביניהם", b: "שומרים מרחק" },
      { q: "להיות חופשי מבחירות שלך, או להיות חופשי מבחובות כלכליות?", a: "חופשי מבחירות", b: "חופשי מבחובות" },
      { q: "לסבול מפערים כלכליים אבל להרגיש שאתה חלק מקבוצה, או להיות עשיר אבל לבד?", a: "לקבוצה", b: "לבד ועשיר" },
      { q: "לדחוף את עצמך קדימה בשביל הקריירה, או לדאוג קודם כל למי שאתה אוהב?", a: "למי שאתה אוהב", b: "לקריירה" },
      { q: "להרשות לעצמך לעזור למישהו קרוב, או לוותר על זה כדי לשמור על יציבות?", a: "לעזור", b: "לשמור על יציבות" },
      { q: "להיות אדם שמביא שמחה לאחרים, או אדם שמדבר על ההצלחות שלו?", a: "מביא שמחה", b: "מדבר על הצלחות" },
      { q: "ללכת על רעיון שיכול להצליח רק עם חברים, או להישאר לבד עם רעיון כלכלי בטוח יותר?", a: "עם חברים", b: "לבד ובטוח" },
      { q: "להרגיש שאתה שייך למשהו גדול, או להרגיש שאתה שולט במשהו גדול?", a: "שייך", b: "שולט" },
      { q: "להשקיע בחיים של אחרים, או בהשקעה שתחזיר לך כסף?", a: "בחיים של אחרים", b: "בהשקעה" },
      { q: "לעבור למקום שקט עם מעט חברים, או למקום מסואב אבל עם הרבה אנשים?", a: "שקט עם מעט חברים", b: "מסואב עם הרבה אנשים" },
      { q: "להתעורר עם מטרה גדולה למרות שאין כסף, או עם כסף רב למרות שאין מטרה?", a: "מטרה גדולה", b: "כסף רב" },
      { q: "ליצור קשרים שיכולים להחזיק מעמד שנים, או להרוויח כסף במהירות?", a: "קשרים ארוכי טווח", b: "כסף מהיר" },
      { q: "להיות האדם שכולם פונים אליו, או האדם שכולם מקנאים בו?", a: "פונים אליו", b: "מקנאים בו" },
      { q: "לשמור על חיי חברה גם כשזה עוזר לך פחות, או להעדיף הצלחה אישית גם אם זה מבודד?", a: "חיי חברה", b: "הצלחה אישית" },
      { q: "לסמוך על אינטואיציה אישית, או על ביטחון כלכלי?", a: "אינטואיציה", b: "ביטחון כלכלי" },
      { q: "לבנות קהילה סביבך, או לבנות נכסים סביבך?", a: "קהילה", b: "נכסים" },
      { q: "להחליט על חופש רגשי גם אם זה יפגע בחוסן הכלכלי, או על חוסן כלכלי גם אם זה יפגע בחופש הרגשי?", a: "חופש רגשי", b: "חוסן כלכלי" },
      { q: "להרגיש שאתה נעים ללב, או שאתה נעים לעין?", a: "ללב", b: "לעין" },
      { q: "לבנות משהו משותף עם אחרים, או לבנות משהו אישי שיספק אותך יותר?", a: "משותף", b: "אישי" },
      { q: "להיות מוכן להפסיד כסף בשביל לשמור על יחסים, או להפסיד יחסים בשביל לשמור על כסף?", a: "לשמור על יחסים", b: "לשמור על כסף" },
      { q: "להפוך להיות סמל של עזרה, או סמל של הצלחה?", a: "עזרה", b: "הצלחה" },
      { q: "להישאר באותו מקום כל החיים כי שם יש לך חברים, או לעבור כל הזמן כי שם יש לך הזדמנויות?", a: "לשמור על חברים", b: "הזדמנויות" },
      { q: "ללמד אחרים משהו חשוב, או ללמוד עוד כדי להיות יותר עשיר?", a: "ללמד אחרים", b: "להתעשר" },
      { q: "להחזיק ברשותך מקום קטן שממלא אותך, או מקום גדול שמספק לך סטטוס?", a: "מקום קטן וממלא", b: "מקום גדול וסטטוס" },
      { q: "לדאוג קודם לכל מי שאתה אוהב, או קודם לעצמך?", a: "לאנשים שאתה אוהב", b: "לעצמך" },
      { q: "להיות מקובל בעיני כולם, או להיות נאמן לעצמך גם אם זה עושה אותך שונה?", a: "מקובל", b: "נאמן לעצמך" },
      { q: "לשחרר זמן למי שמחכה לך, או להשתמש בכל הזמן כדי להרוויח עוד?", a: "למי שמחכה לך", b: "להרוויח עוד" },
      { q: "לבחור באהבה שמערערת אותך, או בביטחון שמרגיע אותך?", a: "אהבה", b: "ביטחון" },
      { q: "להתאהב במובן של עושר, או במובן של קהילה?", a: "עושר", b: "קהילה" },
      { q: "לקבל החלטה שמביאה לך כסף אבל צורכת אותך, או החלטה שמביאה לך חיבור אבל פחות רווח?", a: "חיבור", b: "רווח" },
      { q: "לסבול מקשיים כלכליים עם חברים, או לחיות טוב לבד בלי תחושת שייכות?", a: "עם חברים", b: "לבד" },
      { q: "לחשוב על מה שיגרום לך להרגיש טוב, או על מה שיגרום לך להרוויח יותר?", a: "להרגיש טוב", b: "להרוויח יותר" },
      { q: "להבטיח לעצמך חגים מלאים באנשים, או חגים מלאים בבילויים יקרים?", a: "מלאים באנשים", b: "מלאים בבילויים" },
      { q: "להתמודד עם חוסר יציבות כדי לשמור על קשרים, או להעדיף יציבות גם אם היא מבודדת?", a: "קשרים", b: "יציבות" },
      { q: "לשמור על קשר טוב עם סביבה רחבה, או עם מעגל קטן מאוד?", a: "סביבה רחבה", b: "מעגל קטן" },
      { q: "לרצות להיות מישהו שהאחרים יכולים לסמוך עליו, או מישהו שהאחרים יכולים להתפעל ממנו?", a: "סמוך עליו", b: "להתפעל ממנו" },
      { q: "להיות מישהו שמסוגל לשמוע את כולם, או מישהו שמסוגל לנהל הכל?", a: "לשמוע", b: "לנהל" },

      { q: "להבין אם אתה מחפש חיים עם משמעות, או חיים עם פוטנציאל?", a: "משמעות", b: "פוטנציאל" },
      { q: "לשמור על שקט פנימי עם פחות כסף, או על שקט פיננסי עם פחות שקט פנימי?", a: "שקט פנימי", b: "שקט פיננסי" },

      { q: "להיות מישהו שאפשר לסמוך עליו, או מישהו שאפשר להתפעל ממנו?", a: "סמוך עליו", b: "להתפעל ממנו" },
      { q: "להתעורר עם שאלה של אהבה, או שאלה של רווחים?", a: "אהבה", b: "רווחים" },

      { q: "לבחור במשהו שמקיים אותך, או במשהו שמכניס אותך?", a: "מקיים", b: "מכניס" },
      { q: "להיות אדם שיודע להקשיב, או אדם שיודע להשיג?", a: "להקשיב", b: "להשיג" },
      { q: "להיות בסביבה שמרגיעה אותך, או בסביבה שמעריכה אותך?", a: "מרגיעה", b: "מעריכה" },

      { q: "להפוך את החיים שלך ליפים, או ליציבים?", a: "יפים", b: "יציבים" },
      { q: "להיות מישהו שכולם מקבלים, או מישהו שכולם מתפלאים ממנו?", a: "כולם מקבלים", b: "כולם מתפלאים" },
      { q: "לשמור על משהו שמחמם את הלב, או משהו שמחמם את החשבון?", a: "מחמם את הלב", b: "מחמם את החשבון" },
      { q: "להתמודד עם קושי כלכלי בשביל לשמור על האהבה, או עם קושי רגשי בשביל לשמור על העושר?", a: "אהבה", b: "עושר" },
      { q: "להתכוון לעתיד שכולל אנשים, או עתיד שכולל נכסים?", a: "אנשים", b: "נכסים" }
    ];

    const questionEl = document.getElementById('question');
    const optionAEl = document.getElementById('optionA');
    const optionBEl = document.getElementById('optionB');
    const progressTextEl = document.getElementById('progress-text');
    const progressFillEl = document.getElementById('progress-fill');
    const resultScreen = document.getElementById('result-screen');
    const resultSummaryEl = document.getElementById('result-summary');
    const resultDetailEl = document.getElementById('result-detail');
    const restartBtn = document.getElementById('restart-btn');

    let currentIndex = 0;
    let scoreA = 0;
    let scoreB = 0;

    function showQuestion() {
      if (currentIndex >= questions.length) {
        endGame();
        return;
      }

      const q = questions[currentIndex];
      questionEl.textContent = `${currentIndex + 1}. ${q.q}`;
      optionAEl.textContent = q.a;
      optionBEl.textContent = q.b;
      progressTextEl.textContent = `${currentIndex + 1}/${questions.length}`;
      progressFillEl.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
      resultScreen.classList.add('hidden');
    }

    function endGame() {
      const total = questions.length;
      const aPercent = Math.round((scoreA / total) * 100);
      const bPercent = Math.round((scoreB / total) * 100);

      resultScreen.classList.remove('hidden');
      if (scoreA > scoreB) {
        resultSummaryEl.textContent = `זכית ב-${scoreA} בחירות של צד א' (${aPercent}%)`; 
        resultDetailEl.textContent = 'נראה שאתה נוטה יותר למערכות יחסים, חיבור, משמעות וערכים אנושיים.';
      } else if (scoreB > scoreA) {
        resultSummaryEl.textContent = `זכית ב-${scoreB} בחירות של צד ב' (${bPercent}%)`;
        resultDetailEl.textContent = 'נראה שאתה נוטה יותר ליציבות, הצלחה, שליטה וחשיבה כלכלית.';
      } else {
        resultSummaryEl.textContent = `שוויון מדויק בין הצדדים (${scoreA} מול ${scoreB})`;
        resultDetailEl.textContent = 'יש לך מאזן חזק בין ערכים חברתיים לבין ערכים חומריים.';
      }
    }

    function answer(choice) {
      if (choice === 'A') scoreA++;
      else scoreB++;
      currentIndex++;
      showQuestion();
    }

    optionAEl.addEventListener('click', () => answer('A'));
    optionBEl.addEventListener('click', () => answer('B'));
    restartBtn.addEventListener('click', () => {
      currentIndex = 0;
      scoreA = 0;
      scoreB = 0;
      showQuestion();
    });

    showQuestion();
  </script>
